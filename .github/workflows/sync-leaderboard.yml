name: Sync Leaderboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync leaderboard
        run: npm run sync:leaderboard
        env:
          LEADERBOARD_CSV_URL: ${{ secrets.LEADERBOARD_CSV_URL }}

      - name: Commit leaderboard changes
        run: |
          if git diff --quiet -- data/leaderboard.json leaderboard.html; then
            echo "No leaderboard changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json leaderboard.html
          git commit -m "chore: sync leaderboard"
          git push origin HEAD:main
