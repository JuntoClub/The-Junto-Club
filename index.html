<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Junto Club</title>
  <meta name="description" content="The Junto Club — a society of American collectors." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="site-wrap" aria-label="The Junto Club homepage">
    <section class="artwork-stage">
      <img class="homepage-art" src="assets/junto-club-homepage.png" alt="The Junto Club vintage newspaper-style collectors homepage" />

      <!-- Change this URL to your exact Whatnot page if needed -->
      <a class="hotspot whatnot-main" href="https://www.whatnot.com/user/juntoclub" target="_blank" rel="noopener noreferrer" aria-label="Follow The Junto Club on Whatnot"></a>

      <a class="hotspot coin coin-one" href="https://www.whatnot.com/user/juntoclub" target="_blank" rel="noopener noreferrer" aria-label="Shop 1876 Trade Dollar on Whatnot"></a>
      <a class="hotspot coin coin-two" href="https://www.whatnot.com/user/juntoclub" target="_blank" rel="noopener noreferrer" aria-label="Shop Morgan Dollar on Whatnot"></a>
      <a class="hotspot coin coin-three" href="https://www.whatnot.com/user/juntoclub" target="_blank" rel="noopener noreferrer" aria-label="Shop Gold Liberty on Whatnot"></a>

      <form class="member-form" name="junto-club-members" method="POST" data-netlify="true" action="thank-you.html" aria-label="Join The Junto Club">
        <input type="hidden" name="form-name" value="junto-club-members" />
        <label class="sr-only" for="name">Full name</label>
        <input id="name" name="name" type="text" autocomplete="name" placeholder="Full Name" />
        <label class="sr-only" for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="Email Address" />
        <label class="sr-only" for="phone">Mobile number</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="Mobile Number" />
        <button type="submit" aria-label="Join The Club"></button>
      </form>

      <a class="hotspot footer-link faq" href="#faq" aria-label="FAQ"></a>
      <a class="hotspot footer-link shipping" href="#shipping" aria-label="Shipping"></a>
      <a class="hotspot footer-link contact" href="mailto:hello@juntoclubco.com" aria-label="Contact The Junto Club"></a>
    </section>
  </main>
</body>
</html>
